name: Create Release

on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - "v*" # Push events to matching v*, i.e. v1.0, v20.15.10

permissions:
  contents: write

jobs:
  build:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate release artifacts
        shell: bash
        run: |
          required_files=(
            "./releases/latest/Standalone.Zip"
            "./releases/latest/WithTests.Zip"
            "./releases/latest/changelog.txt"
          )
          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "::error file=$file::Missing required release artifact."
              exit 1
            fi
          done

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: true
          prerelease: false
          files: |
            releases/latest/Standalone.Zip
            releases/latest/WithTests.Zip
            releases/latest/changelog.txt


